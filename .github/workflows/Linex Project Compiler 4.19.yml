name: Linex Project 4.19 Optimized

on:
  workflow_dispatch:
    inputs:
      kernel_url:
        description: 'URL Repo Kernel'
        required: true
        default: 'https://github.com/fa-ska/4.19_android_kernel_xiaomi_sdm845'
      kernel_branch:
        description: 'Branch Kernel'
        required: true
        default: 'rebase'
      base_defconfig:
        description: 'Base Defconfig'
        required: true
        default: 'sdm845-perf_defconfig'
      device_defconfig:
        description: 'Device Config (Path dari arch/arm64/configs/)'
        required: true
        default: 'vendor/xiaomi/beryllium.config'
      build_name:
        description: 'Nama Hasil Build'
        required: true
        default: '4.19_beryllium_fa_ska'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prep Environment
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
          bc bison build-essential curl flex git libssl-dev libxml2-utils lzop make zip zstd \
          python3 ca-certificates device-tree-compiler rsync libelf-dev wget

      - name: Setup Proton Clang
        run: |
          mkdir -p $HOME/tc
          curl -LSs "https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz" | tar -C $HOME/tc --strip-components=1 -xz

      - name: Build Kernel
        run: |
          # 1. Clone & Patch
          git clone --depth=1 ${{ github.event.inputs.kernel_url }} -b ${{ github.event.inputs.kernel_branch }} kernel
          cd kernel
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          
          # 2. Hard Cleanup (Techpack & Scripts)
          find . -type f \( -name "Kconfig" -o -name "Makefile" \) -exec sed -i '/techpack/d' {} +
          [ -f scripts/dtc/dtc-lexer.lex.c_shipped ] && sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true

          # 3. Compile Variables - MEMISAHKAN HOST DAN TARGET
          # Ini kunci untuk memperbaiki error libc.so.6 (Error di log 7767/7770)
          export PATH="$HOME/tc/bin:$PATH"
          ARGS=(
            ARCH=arm64 
            O=out 
            CC=clang 
            HOSTCC=gcc 
            HOSTCXX=g++
            LD=ld.lld
            CROSS_COMPILE=aarch64-linux-gnu- 
            CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            AR=llvm-ar 
            NM=llvm-nm 
            OBJCOPY=llvm-objcopy 
            OBJDUMP=llvm-objdump 
            STRIP=llvm-strip
            KCFLAGS="-w -fpermissive -fno-stack-protector -D_FORTIFY_SOURCE=0"
          )

          # 4. Process Build
          mkdir -p out
          ./scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/${{ github.event.inputs.base_defconfig }} \
            arch/arm64/configs/${{ github.event.inputs.device_defconfig }}
          
          make "${ARGS[@]}" oldconfig
          # Pastikan scripts build menggunakan compiler host sistem
          make -j$(nproc --all) "${ARGS[@]}"

      - name: Package & Upload
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3
          for f in kernel/out/arch/arm64/boot/Image.gz-dtb kernel/out/arch/arm64/boot/Image.gz kernel/out/arch/arm64/boot/Image; do
            [ -f "$f" ] && cp "$f" AnyKernel3/ && break
          done
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/
          
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.build_name }}
          path: AnyKernel3/*
