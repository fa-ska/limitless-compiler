name: Linex Project Compiler 4.19 Optimized Pro

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Hasil Build'
        default: '4.19_kernel_beryllium_fa_ska'
      kernel-url:
        description: 'URL Repo Kernel'
        default: 'https://github.com/fa-ska/4.19_android_kernel_xiaomi_sdm845'
      kernel-branch:
        description: 'Branch'
        default: 'rebase'
      base-defconfig:
        description: 'Base Defconfig'
        default: 'sdm845-perf_defconfig'
      device-defconfig:
        description: 'Device Config'
        default: 'vendor/xiaomi/beryllium.config'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex git git-core gnupg gperf \
            libssl-dev libxml2-utils lzop make zip zstd python3 ca-certificates \
            clang lld llvm device-tree-compiler libelf-dev wget libdebuginfod-dev \
            libssl-dev rsync

      - name: Toolchain Setup
        run: |
          mkdir -p $HOME/toolchain
          # Menggunakan GCC dari mvaisakh sesuai script awalmu
          curl -LSs "https://github.com/mvaisakh/gcc-arm64/archive/refs/heads/master.tar.gz" | tar -C $HOME/toolchain --strip-components=1 -xz

      - name: Source, Patching & Compilation
        run: |
          # 1. Ambil Source
          git clone --recursive --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel
          cd kernel
          
          # 2. Patching (KernelSU-Next)
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          
          # Fix common compilation issues
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          
          # 3. Persiapan Build
          export PATH="$HOME/toolchain/bin:$PATH"
          export KBUILD_BUILD_USER="fa_s_ka"
          export KBUILD_BUILD_HOST="linext"
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-elf-
          export CROSS_COMPILE_ARM32=arm-eabi-
          
          mkdir -p out
          
          # Gabungkan defconfigs
          ./scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/${{ inputs.base-defconfig }} \
            arch/arm64/configs/${{ inputs.device-defconfig }}

          # --- FIX ERROR 'u8' & 'bounds.c' ---
          # Langkah ini wajib agar header kernel (linux/types.h dll) digenerate dengan benar
          make O=out ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE prepare -j$(nproc --all)
          make O=out ARCH=$ARCH CROSS_COMPILE=$CROSS_COMPILE scripts -j$(nproc --all)
          
          # 4. Kompilasi Utama (Gaspol)
          # Menggunakan flag -w dan -fpermissive untuk mengabaikan warning yang dianggap error
          make -j$(nproc --all) O=out ARCH=$ARCH \
            CROSS_COMPILE=$CROSS_COMPILE \
            CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
            KCFLAGS="-w -fpermissive -fno-stack-protector -D_FORTIFY_SOURCE=0" \
            KCPPFLAGS="-D__ASSEMBLY__ -D_FORTIFY_SOURCE=0"

      - name: Packing
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          
          # Cek lokasi hasil build dan copy ke AnyKernel3
          if [ -f kernel/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
          elif [ -f kernel/out/arch/arm64/boot/Image ]; then
            cp kernel/out/arch/arm64/boot/Image AnyKernel3/Image
          fi
          
          # Copy DTBO jika ada
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*
