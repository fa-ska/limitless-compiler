name: Linex Project Compiler 4.19 Optimized Pro
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Hasil Build'
        default: '4.19_kernel_beryllium_fa_ska'
      kernel-url:
        description: 'URL Repo Kernel'
        default: 'https://github.com/fa-ska/4.19_android_kernel_xiaomi_sdm845'
      kernel-branch:
        description: 'Branch'
        default: 'rebase'
      base-defconfig:
        description: 'Base Defconfig'
        default: 'sdm845-perf_defconfig'
      device-defconfig:
        description: 'Device Config'
        default: 'vendor/xiaomi/beryllium.config'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex git git-core gnupg gperf \
            libssl-dev libxml2-utils lzop make zip zstd python3 ca-certificates \
            clang lld llvm device-tree-compiler libelf-dev

      - name: Toolchain Setup
        run: |
          mkdir -p $HOME/clang $HOME/gcc64 $HOME/gcc32
          # Menggunakan AOSP Clang r416183b - Standar emas untuk Kernel 4.19
          curl -LSs "https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/main/clang-r416183b.tar.gz" | tar -C $HOME/clang -xz
          # GCC 4.9 untuk menangani assembly yang sensitif
          curl -LSs "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/tags/android-12.1.0_r27/aarch64-linux-android-4.9.tar.gz" | tar -C $HOME/gcc64 -xz
          curl -LSs "https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/arm/arm-linux-androideabi-4.9/+archive/refs/tags/android-12.1.0_r27/arm-linux-androideabi-4.9.tar.gz" | tar -C $HOME/gcc32 -xz

      - name: Source & Patching
        run: |
          # Clone dengan --recursive untuk menarik submodule techpack
          git clone --recursive --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel
          cd kernel
          
          # Setup KernelSU-Next
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          
          # --- FIX TECHPACK (Jaga-jaga jika submodule tetap kosong) ---
          if [ ! -d "techpack/mi845" ]; then
            echo "Techpack mi845 tidak ditemukan, melakukan bypass..."
            sed -i 's/source "techpack\/Kconfig"/# /g' Kconfig || true
            sed -i 's/obj-y += techpack\// # /g' Makefile || true
          fi

      - name: Compilation
        run: |
          cd kernel
          export PATH="$HOME/clang/bin:$HOME/gcc64/bin:$HOME/gcc32/bin:$PATH"
          export KBUILD_BUILD_USER="fa_s_ka"
          export KBUILD_BUILD_HOST="linext"
          
          mkdir -p out
          
          # Merge Config
          ARCH=arm64 ./scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/${{ inputs.base-defconfig }} \
            arch/arm64/configs/${{ inputs.device-defconfig }}
          
          # Build dengan Mixed GCC/Clang (Standard Professional)
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LD=aarch64-linux-android-ld \
            AS=aarch64-linux-android-as \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip \
            LLVM=1 \
            LLVM_IAS=0

      - name: Packing
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          # Mengambil Image kernel yang berhasil di-build
          find kernel/out/arch/arm64/boot/ -name "Image*" -exec cp {} AnyKernel3/ \;
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*
