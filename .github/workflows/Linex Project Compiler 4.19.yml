name: Linex Project Compiler 4.19 Optimized Pro

on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Hasil Build'
        default: '4.19_kernel_beryllium_fa_ska'
      kernel-url:
        description: 'URL Repo Kernel'
        default: 'https://github.com/fa-ska/4.19_android_kernel_xiaomi_sdm845'
      kernel-branch:
        description: 'Branch'
        default: 'rebase'
      base-defconfig:
        description: 'Base Defconfig'
        default: 'sdm845-perf_defconfig'
      device-defconfig:
        description: 'Device Config'
        default: 'vendor/xiaomi/beryllium.config'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex git git-core gnupg gperf \
            libssl-dev libxml2-utils lzop make zip zstd python3 ca-certificates \
            clang lld llvm device-tree-compiler libelf-dev wget libdebuginfod-dev \
            rsync

      - name: Toolchain Setup (AOSP Clang)
        run: |
          mkdir -p $HOME/clang
          # Menggunakan Clang r450784d (Standard Android 12/13)
          wget -q https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/heads/master/clang-r450784d.tar.gz -O clang.tar.gz
          tar -C $HOME/clang -zxf clang.tar.gz
          
          mkdir -p $HOME/gcc64
          wget -q https://android.googlesource.com/platform/prebuilts/gcc/linux-x86/aarch64/aarch64-linux-android-4.9/+archive/refs/heads/master.tar.gz -O gcc64.tar.gz
          tar -C $HOME/gcc64 -zxf gcc64.tar.gz

      - name: Source, Patching & Compilation
        run: |
          git clone --recursive --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel
          cd kernel
          
          # 1. Agresif Fix Techpack & Header
          sed -i '/techpack/d' Kconfig Makefile
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          
          # 2. Patching KernelSU
          curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -s next
          
          # 3. Setup Environment variables
          CLANG_DIR=$HOME/clang
          GCC_DIR=$HOME/gcc64
          export PATH="$CLANG_DIR/bin:$GCC_DIR/bin:$PATH"
          
          export ARCH=arm64
          export KBUILD_BUILD_USER="fa_s_ka"
          export KBUILD_BUILD_HOST="linext"
          
          # Definisi Compiler (Clang + GCC as linker)
          MAKE_PARAMS=(
            ARCH=arm64
            O=out
            CC=clang
            CLANG_TRIPLE=aarch64-linux-gnu-
            CROSS_COMPILE=aarch64-linux-android-
            LD=ld.lld
            AR=llvm-ar
            NM=llvm-nm
            OBJCOPY=llvm-objcopy
            OBJDUMP=llvm-objdump
            STRIP=llvm-strip
          )

          mkdir -p out
          
          # 4. Create Config
          ./scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/${{ inputs.base-defconfig }} \
            arch/arm64/configs/${{ inputs.device-defconfig }}

          # 5. Build Process
          make "${MAKE_PARAMS[@]}" oldconfig
          make "${MAKE_PARAMS[@]}" prepare -j$(nproc --all)
          make "${MAKE_PARAMS[@]}" scripts -j$(nproc --all)
          
          # Gaspol Kompilasi Utama
          make -j$(nproc --all) "${MAKE_PARAMS[@]}" \
            KCFLAGS="-w -fpermissive -fno-stack-protector"

      - name: Packing
        run: |
          cd $GITHUB_WORKSPACE
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          if [ -f kernel/out/arch/arm64/boot/Image.gz-dtb ]; then
            cp kernel/out/arch/arm64/boot/Image.gz-dtb AnyKernel3/Image.gz-dtb
          elif [ -f kernel/out/arch/arm64/boot/Image ]; then
            cp kernel/out/arch/arm64/boot/Image AnyKernel3/Image
          fi
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*
