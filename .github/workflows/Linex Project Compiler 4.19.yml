name: Linex Project Compiler 4.19 Optimized Pro
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Hasil Build'
        default: '4.19_kernel_beryllium_fa_ska'
      kernel-url:
        description: 'URL Repo Kernel'
        default: 'https://github.com/fa-ska/4.19_android_kernel_xiaomi_sdm845'
      kernel-branch:
        description: 'Branch'
        default: 'rebase'
      base-defconfig:
        description: 'Base Defconfig'
        default: 'beryllium_defconfig'
      device-defconfig:
        description: 'Device Config (Vendor)'
        default: 'vendor/xiaomi/beryllium.config'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment Setup
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex git git-core gnupg gperf \
            libssl-dev libxml2-utils lzop make zip zstd python3 ca-certificates \
            clang lld llvm device-tree-compiler libelf-dev wget libdebuginfod-dev

      - name: Toolchain Setup
        run: |
          mkdir -p $HOME/toolchain
          curl -LSs "https://github.com/mvaisakh/gcc-arm64/archive/refs/heads/master.tar.gz" | tar -C $HOME/toolchain --strip-components=1 -xz

      - name: Source, Patching & Compilation
        run: |
          # 1. Ambil Source
          git clone --recursive --depth=1 ${{ inputs.kernel-url }} -b ${{ inputs.kernel-branch }} kernel
          cd kernel
          
          # 2. Patching (Fix untuk GCC modern & DTC)
          sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          
          # Matikan Techpack yang sering bikin error kompilasi
          sed -i 's/source "techpack\/Kconfig"/# /g' Kconfig || true
          sed -i 's/obj-y += techpack\// # /g' Makefile || true

          # 3. Masak Kernel
          export PATH="$HOME/toolchain/bin:$PATH"
          export KBUILD_BUILD_USER="fa_s_ka"
          export KBUILD_BUILD_HOST="linext"
          
          mkdir -p out
          
          # Gabungkan defconfig sesuai folder di screenshot 7843.png & 7845.png
          ARCH=arm64 ./scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/${{ inputs.base-defconfig }} \
            arch/arm64/configs/${{ inputs.device-defconfig }}

          # Fix error 7842.png (u8/bool) dengan memaksa HOSTCC=gcc
          make O=out ARCH=arm64 CROSS_COMPILE=aarch64-elf- HOSTCC=gcc prepare -j$(nproc --all)
          
          # Gaspol: Gabungan flag anti-error IPA, QCOM, dan Memory
          make -j$(nproc --all) O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-elf- \
            CROSS_COMPILE_ARM32=arm-eabi- \
            HOSTCC=gcc \
            KCFLAGS="-w -fpermissive -fno-stack-protector -D_FORTIFY_SOURCE=0 -Wno-error" \
            KCPPFLAGS="-D__ASSEMBLY__ -D_FORTIFY_SOURCE=0"

      - name: Packing
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          # Ambil semua Image yang berhasil dibuat
          find kernel/out/arch/arm64/boot/ -name "Image*" -exec cp {} AnyKernel3/ \;
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*
