name: Linex Project Compiler 4.19
on:
  workflow_dispatch:
    inputs:
      name:
        description: 'Nama Hasil Build'
        default: '4.19_kernel'
      kernel-url:
        description: 'URL Repo Kernel'
        default: 'https://github.com/'
      kernel-branch:
        description: 'Branch'
        default: 'main'
      kernel-config:
        description: 'Defconfig'
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Environment & Swap
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bc bison build-essential curl flex git git-core gnupg gperf \
            libssl-dev libxml2-utils lzop make zip zstd python3 ca-certificates \
            clang lld llvm gcc-arm-linux-gnueabi gcc-aarch64-linux-gnu clang
            
      - name: Compilation
        working-directory: kernel
        run: |
          export KBUILD_BUILD_USER="linex"
          export KBUILD_BUILD_HOST="fa_ska"
          
          # Gunakan cara ini agar fragment config terbaca benar
          make O=out ARCH=arm64 sdm845-perf_defconfig
          make O=out ARCH=arm64 xiaomi/beryllium.config
          
          # Lanjutkan build kernel
          make -j$(nproc --all) O=out ARCH=arm64 \
            CC=clang \
            CLANG_TRIPLE=aarch64-linux-gnu- \
            CROSS_COMPILE=aarch64-linux-android- \
            CROSS_COMPILE_ARM32=arm-linux-androideabi- \
            LLVM=1 LLVM_IAS=0

      - name: Packing
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/LICENSE AnyKernel3/README.md
          
          # Cari hasil Image secara otomatis
          find kernel/out/arch/arm64/boot/ -name "Image*" -exec cp {} AnyKernel3/ \;
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*          

      - name: Packing
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel3
          rm -rf AnyKernel3/.git AnyKernel3/LICENSE AnyKernel3/README.md
          
          # Cari hasil Image secara otomatis
          find kernel/out/arch/arm64/boot/ -name "Image*" -exec cp {} AnyKernel3/ \;
          [ -f kernel/out/arch/arm64/boot/dtbo.img ] && cp kernel/out/arch/arm64/boot/dtbo.img AnyKernel3/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.name }}
          path: AnyKernel3/*
