name: Linex Project 4.19 Optimized

on:
  workflow_dispatch:
    inputs:
      kernel-url:
        description: 'URL Repo Kernel'
        default: 'https://github.com/fa-ska/4.19_android_kernel_xiaomi_sdm845'
      kernel-branch:
        description: 'Branch'
        default: 'rebase'
      base-defconfig:
        description: 'Base Defconfig'
        default: 'sdm845-perf_defconfig'
      device-defconfig:
        description: 'Device Config'
        default: 'vendor/xiaomi/beryllium.config'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential bc libssl-dev libelf-dev flex bison rsync zip
          mkdir -p $GITHUB_WORKSPACE/toolchain
          cd $GITHUB_WORKSPACE/toolchain
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm64 gcc64
          git clone --depth=1 https://github.com/mvaisakh/gcc-arm gcc32

      - name: Prepare Source
        run: |
          cd $GITHUB_WORKSPACE
          # Hapus folder source jika ada sisa kegagalan sebelumnya
          rm -rf source
          git clone --depth=1 ${{ github.event.inputs.kernel-url }} -b ${{ github.event.inputs.kernel-branch }} source
          
      - name: Fix Techpack & Merge Config
        run: |
          cd $GITHUB_WORKSPACE/source
          # Hapus techpack dari Kconfig & Makefile agar tidak error
          find . -name "Kconfig" -exec sed -i '/techpack/d' {} +
          find . -name "Makefile" -exec sed -i '/techpack/d' {} +
          
          # Buat folder output
          mkdir -p out
          
          # Jalankan merge_config dengan path yang benar (relatif terhadap folder source)
          # Kita gunakan arch/arm64/configs/ sebagai base jika sdm845-perf_defconfig ada di sana
          scripts/kconfig/merge_config.sh -O out \
            arch/arm64/configs/${{ github.event.inputs.base-defconfig }} \
            arch/arm64/configs/${{ github.event.inputs.device-defconfig }}

      - name: Compilation
        run: |
          cd $GITHUB_WORKSPACE/source
          export PATH=$GITHUB_WORKSPACE/toolchain/gcc64/bin:$PATH
          export PATH=$GITHUB_WORKSPACE/toolchain/gcc32/bin:$PATH
          make -j$(nproc --all) O=out ARCH=arm64 \
            CROSS_COMPILE=aarch64-elf- \
            CROSS_COMPILE_ARM32=arm-eabi- \
            HOSTCC=gcc HOSTCXX=g++

      - name: Packing & Upload
        run: |
          cd $GITHUB_WORKSPACE
          if [ -f source/out/arch/arm64/boot/Image.gz-dtb ]; then
            git clone --depth=1 https://github.com/osm0sis/AnyKernel3 AnyKernel
            cp source/out/arch/arm64/boot/Image.gz-dtb AnyKernel/
            cd AnyKernel
            sed -i 's/do.devicecheck=1/do.devicecheck=0/g' anykernel.sh
            sed -i 's/device.name1=maguro/device.name1=beryllium/g' anykernel.sh
            zip -r9 Linex-Beryllium-Kernel.zip *
            mv *.zip $GITHUB_WORKSPACE/
          else
            echo "Kompilasi Gagal, file tidak tercipta!" && exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Kernel_Poco_F1
          path: ./*.zip
