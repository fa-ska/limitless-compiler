name: Linex Project 4.19 Docker Edition

on:
  workflow_dispatch:
    inputs:
      kernel_url:
        default: 'https://github.com/fa-ska/4.19_android_kernel_xiaomi_sdm845'
      kernel_branch:
        default: 'rebase'
      build_name:
        default: '4.19_beryllium_final'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:bullseye # Menggunakan Debian untuk stabilitas linker
    steps:
      - name: Install Dependencies
        run: |
          apt-get update && apt-get install -y \
          bc bison build-essential curl flex git libssl-dev libxml2-utils lzop make zip zstd \
          python3 ca-certificates device-tree-compiler rsync libelf-dev wget
          
      - name: Setup Toolchain & Build
        run: |
          # Setup Toolchain
          mkdir -p $HOME/tc
          curl -LSs "https://github.com/kdrag0n/proton-clang/archive/refs/heads/master.tar.gz" | tar -C $HOME/tc --strip-components=1 -xz
          
          # Clone Source
          git clone --depth=1 ${{ github.event.inputs.kernel_url }} -b ${{ github.event.inputs.kernel_branch }} kernel
          cd kernel
          
          # Patching & Cleanup
          find . -type f \( -name "Kconfig" -o -name "Makefile" \) -exec sed -i '/techpack/d' {} +
          [ -f scripts/dtc/dtc-lexer.lex.c_shipped ] && sed -i 's/^YYLTYPE yylloc;/extern YYLTYPE yylloc;/g' scripts/dtc/dtc-lexer.lex.c_shipped || true
          
          # Build Process
          export PATH="$HOME/tc/bin:$PATH"
          MAKE_ARGS=(
            ARCH=arm64 O=out CC=clang
            CROSS_COMPILE=aarch64-linux-gnu- CROSS_COMPILE_ARM32=arm-linux-gnueabi-
            NM=llvm-nm AR=llvm-ar LD=ld.lld STRIP=llvm-strip OBJCOPY=llvm-objcopy
          )
          
          mkdir -p out
          make "${MAKE_ARGS[@]}" sdm845-perf_defconfig vendor/xiaomi/beryllium.config
          make -j$(nproc --all) "${MAKE_ARGS[@]}"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.build_name }}
          path: kernel/out/arch/arm64/boot/Image*
